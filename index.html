<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#007B43" />
  <meta name="description" content="漫画研究会テク班 - 活動のお知らせ" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="テク班" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <title>テク班 活動お知らせ</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

    /* ── Design Tokens ───────────────────────────────────────── */
    :root {
      --green:       #007B43;
      --green-light: #e8f4ee;
      --green-mid:   #c2dfd0;
      --green-dark:  #005c32;
      --bg:          #f7faf8;
      --surface:     #ffffff;
      --panel:       #f0f7f3;
      --ink:         #1a2e24;
      --ink-muted:   #6b8070;
      --red:         #d94f4f;
      --line:        #ddeae3;

      --font-body: 'Noto Sans JP', 'Hiragino Sans', sans-serif;

      --radius:  12px;
      --radius-sm: 8px;
      --shadow:  0 2px 12px rgba(0,123,67,.08);
      --trans:   .18s ease;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.7;
      min-height: 100dvh;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .page-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 32px 0 24px;
      border-bottom: 2px solid var(--green);
    }
    .header-emblem {
      width: 48px;
      height: 48px;
      background: var(--green);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 20px;
      color: #fff;
      flex-shrink: 0;
    }
    .header-text small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .08em;
      color: var(--ink-muted);
      margin-bottom: 2px;
    }
    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--ink);
    }

    /* ── Section titles ──────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--green);
      margin: 28px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── Activity card ───────────────────────────────────────── */
    .activity-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      display: grid;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    .activity-card .loading-placeholder {
      color: var(--ink-muted);
      font-size: 13px;
      text-align: center;
      padding: 12px 0;
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .info-icon {
      width: 36px;
      height: 36px;
      background: var(--green-light);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .info-body small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-muted);
      margin-bottom: 2px;
    }
    .info-body strong {
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
    }

    /* ── 資料画像 ──────────────────────────────────────────────── */
    .material-img {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      display: block;
      background: var(--panel);
      min-height: 180px;
      object-fit: contain;
      box-shadow: var(--shadow);
    }
    .material-img.hidden { display: none; }

    /* ── Push通知セクション ───────────────────────────────────── */
    .notify-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .notify-card p {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    /* ── Button ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity var(--trans), transform var(--trans), background var(--trans);
      font-family: var(--font-body);
      width: 100%;
      justify-content: center;
      letter-spacing: .02em;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: var(--green);
      color: #fff;
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled {
      background: var(--green-mid);
      cursor: not-allowed;
      color: var(--green-dark);
      opacity: .7;
    }
    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(217,79,79,.4);
      margin-top: 10px;
    }
    .btn-danger:hover { background: rgba(217,79,79,.06); }

    /* ── Status badge ────────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .status-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .status-badge.enabled  { background: var(--green-light); color: var(--green-dark); }
    .status-badge.enabled  .dot { background: var(--green); }
    .status-badge.disabled { background: #f0f0f0; color: #888; }
    .status-badge.disabled .dot { background: #aaa; }
    .status-badge.blocked  { background: rgba(217,79,79,.1); color: var(--red); }
    .status-badge.blocked  .dot { background: var(--red); }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--ink);
      color: #fff;
      border-radius: 40px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
    }

    /* ── Utility ─────────────────────────────────────────────── */
    .hidden { display: none !important; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- ヘッダー -->
  <header>
    <div class="header-emblem">絵</div>
    <div class="header-text">
      <small>漫画研究会</small>
      <h1>テク班 活動お知らせ</h1>
    </div>
  </header>

  <!-- 今週の活動 -->
  <p class="section-label">今週の活動</p>
  <div class="activity-card" id="activityCard">
    <div class="loading-placeholder" id="activityLoading">読み込み中…</div>

    <div id="activityContent" class="hidden">
      <div class="info-row">
        <div class="info-icon">📅</div>
        <div class="info-body">
          <small>開催日時</small>
          <strong id="infoDate">—</strong>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">📍</div>
        <div class="info-body">
          <small>教室</small>
          <strong id="infoRoom">—</strong>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">📝</div>
        <div class="info-body">
          <small>備考</small>
          <strong id="infoNote">—</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- 今週の資料 -->
  <p class="section-label">今週の資料</p>
  <img id="materialImg" class="material-img hidden"
       alt="今週の練習資料" loading="lazy" />
  <div id="materialLoading" style="color:var(--ink-muted);font-size:13px;padding:10px 0;text-align:center;">
    読み込み中…
  </div>

  <!-- プッシュ通知 -->
  <p class="section-label">プッシュ通知</p>
  <div class="notify-card">
    <div id="pushStatus" class="status-badge disabled">
      <span class="dot"></span>
      <span id="pushStatusText">状態を確認中…</span>
    </div>
    <p id="pushDescription">
      「通知を許可する」を押すと、毎週の活動開始前に自動でお知らせが届きます。
    </p>
    <button class="btn btn-primary" id="btnSubscribe" disabled>
      🔔 通知を許可する
    </button>
    <button class="btn btn-danger hidden" id="btnUnsubscribe">
      通知を停止する
    </button>
  </div>

  <footer>
    漫画研究会テク班 &copy; 2025 &nbsp;|&nbsp; Powered by PWA + GAS + FCM
  </footer>
</div>

<!-- トースト -->
<div id="toast"></div>

<!-- ================================================================
     Firebase JS SDK v9 (compat版 CDN)
     compat版を使うことで、v8と同じ名前空間スタイルで記述できる
  ================================================================ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

<!-- ================================================================
     アプリケーションスクリプト
  ================================================================ -->
<script>
  // ────────────────────────────────────────────────────────────────
  // 設定値（Firebase Console / GASデプロイ後に設定済み）
  // ────────────────────────────────────────────────────────────────
  const CONFIG = {
    // GAS WebApp URL
    GAS_ENDPOINT: 'https://script.google.com/macros/s/AKfycbyAki1O4PjNFru1UmDdSv8JJTC-PgB47v8PHcoeshzgbItrvJWI-CCnUWJz1j0xwU07uA/exec',

    // Firebase プロジェクト設定（Firebase Console > プロジェクトの設定 > マイアプリ）
    FIREBASE_CONFIG: {
        apiKey: "AIzaSyAW0Dml8tSNNybpsegTKhZn0k8g1yA3-a0",
        authDomain: "auto-notification-for-tekuhan.firebaseapp.com",
        projectId: "auto-notification-for-tekuhan",
        storageBucket: "auto-notification-for-tekuhan.firebasestorage.app",
        messagingSenderId: "269103417349",
        appId: "1:269103417349:web:0afb0762c6247fffe2346c",
    },

    // FCM ウェブプッシュ証明書の公開鍵（Firebase Console > Cloud Messaging > ウェブプッシュ証明書）
    // ※ VAPID_PUBLIC_KEY は FCM getToken() の vapidKey オプションとして使う
    VAPID_PUBLIC_KEY: 'BE6vdHPzj5T1x-QI64gRXRYYPTtIsWrxjhpKwmNNexpIefQd80FoZya0BE-p1Bz1Agk3TlbtXo6oKK3jw0S946g',
  };

  // ────────────────────────────────────────────────────────────────
  // Firebase の初期化
  // ────────────────────────────────────────────────────────────────
  firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
  const messaging = firebase.messaging();
  let swRegistration = null; // 登録済みSWをgetToken()へ渡すために保持する

  // ────────────────────────────────────────────────────────────────
  // ユーティリティ
  // ────────────────────────────────────────────────────────────────

  /** トースト通知を表示 */
  function showToast(msg, durationMs = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), durationMs);
  }

  /**
   * Google Drive の各種URLをダイレクトリンクへ変換する。
   *   /file/d/【ID】/view...  → uc?export=view&id=【ID】
   *   /open?id=【ID】         → uc?export=view&id=【ID】
   *   すでに uc?... 形式       → そのまま返す
   */
  function convertDriveUrl(url) {
    if (!url) return url;
    const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (fileMatch) return `https://drive.google.com/thumbnail?id=${fileMatch[1]}&sz=w1000`;
    const openMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (openMatch) return `https://drive.google.com/thumbnail?id=${openMatch[1]}&sz=w1000`;
    return url;
  }

  // ────────────────────────────────────────────────────────────────
  // Service Worker の登録
  // FCM はサービスワーカー名を "firebase-messaging-sw.js" に限定しているが、
  // sw.js に importScripts で Firebase SDK を読み込む構成を取るため、
  // SW 登録時に scriptURL を明示して sw.js を使わせる。
  // ────────────────────────────────────────────────────────────────
  async function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) {
      console.warn('[SW] Service Workerは非対応です');
      return null;
    }
    try {
      // FCM SDK は useServiceWorker() で任意のSWを指定できる
      const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
      console.log('[SW] 登録成功:', reg.scope);
      // v9では useServiceWorker() は廃止。代わりに getToken() の
      // serviceWorkerRegistration オプションで SW を渡す方式に変更。
      return reg;
    } catch (err) {
      console.error('[SW] 登録失敗:', err);
      return null;
    }
  }

  // ────────────────────────────────────────────────────────────────
  // Push通知の購読状態を反映してUIを更新する
  // ────────────────────────────────────────────────────────────────
  function updatePushUI(state) {
    // state: 'default' | 'granted' | 'denied'
    const badge     = document.getElementById('pushStatus');
    const badgeTxt  = document.getElementById('pushStatusText');
    const desc      = document.getElementById('pushDescription');
    const btnSub    = document.getElementById('btnSubscribe');
    const btnUnsub  = document.getElementById('btnUnsubscribe');

    badge.className = 'status-badge';

    if (state === 'granted') {
      badge.classList.add('enabled');
      badgeTxt.textContent = '通知オン';
      desc.textContent     = '活動前に自動でお知らせが届きます。';
      btnSub.classList.add('hidden');
      btnUnsub.classList.remove('hidden');

    } else if (state === 'denied') {
      badge.classList.add('blocked');
      badgeTxt.textContent = 'ブロック中';
      desc.textContent     = 'ブラウザの設定から通知の許可を変更できます。';
      btnSub.disabled      = true;
      btnSub.textContent   = '🔕 通知がブロックされています';
      btnSub.classList.remove('hidden');
      btnUnsub.classList.add('hidden');

    } else {
      badge.classList.add('disabled');
      badgeTxt.textContent = '通知オフ';
      desc.textContent     = '「通知を許可する」を押すと、毎週の活動開始前に自動でお知らせが届きます。';
      btnSub.disabled      = false;
      btnSub.textContent   = '🔔 通知を許可する';
      btnSub.classList.remove('hidden');
      btnUnsub.classList.add('hidden');
    }
  }

  // ────────────────────────────────────────────────────────────────
  // FCMトークンを取得し、GASバックエンドへ保存する（FCM版）
  //
  // 変更前: pushManager.subscribe() で Web Push 購読オブジェクトを生成していた
  // 変更後: messaging.getToken() で FCM デバイストークン（文字列）を取得する
  //         → GASはこのトークンを使って FCM HTTP v1 API で通知を送る
  // ────────────────────────────────────────────────────────────────
  async function subscribeToPush() {
    const btnSub = document.getElementById('btnSubscribe');
    btnSub.disabled  = true;
    btnSub.textContent = '設定中…';

    try {
      // ① ブラウザの通知許可を取得
      //    getToken() 内部でも requestPermission が走るが、
      //    先に呼んで denied の場合を早期リターンするために明示的に呼ぶ
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        updatePushUI('denied');
        showToast('通知が許可されませんでした');
        return;
      }

      // ② FCM デバイストークンを取得
      //    vapidKey には Firebase Console で発行したウェブプッシュ証明書の公開鍵を渡す
      const fcmToken = await messaging.getToken({
        vapidKey: CONFIG.VAPID_PUBLIC_KEY,
        serviceWorkerRegistration: swRegistration,
      });

      if (!fcmToken) {
        throw new Error('FCMトークンの取得に失敗しました（空のトークン）');
      }
      console.log('[FCM] トークン取得成功:', fcmToken);

      // ③ FCMトークンをGAS doPost へ送信して Subscribers シートに保存する
      //    GAS は POST リダイレクトも発生するため redirect:'follow' を付与する
      const res = await fetch(CONFIG.GAS_ENDPOINT, {
        method:   'POST',
        redirect: 'follow',
        headers:  { 'Content-Type': 'text/plain' }, // GAS の doPost は application/json だとCORSプリフライトが発生するため text/plain を使う
        body:     JSON.stringify({
          action:   'subscribe',
          fcmToken: fcmToken,
        }),
      });

      // GAS の doPost は常に200を返すため、レスポンスのJSONで成否を判定する
      const json = await res.json();
      if (json.status === 'error') throw new Error(json.message);

      // ④ UI を「通知オン」に更新
      updatePushUI('granted');
      showToast('✅ 通知を設定しました！');

      // ⑤ フォアグラウンド受信時のハンドラ（アプリが開いている状態での通知）
      messaging.onMessage((payload) => {
        console.log('[FCM] フォアグラウンド受信:', payload);
        const title = payload.notification?.title || 'テク班 活動お知らせ';
        const body  = payload.notification?.body  || '今週の活動情報が更新されました。';
        showToast(`🔔 ${body}`, 5000);
        // アプリが開いているときはブラウザ通知が自動では出ないため、
        // Notification APIで手動表示する
        if (Notification.permission === 'granted') {
          new Notification(title, {
            body,
            icon:  './icons/icon-192.png',
            badge: './icons/icon-192.png',
          });
        }
      });

    } catch (err) {
      console.error('[FCM] 購読エラー:', err);
      showToast('エラーが発生しました。再度お試しください。');
      // ボタンを元に戻す
      btnSub.disabled    = false;
      btnSub.textContent = '🔔 通知を許可する';
    }
  }

  // ────────────────────────────────────────────────────────────────
  // 通知を停止する（FCM版）
  //
  // 変更前: pushManager.getSubscription().unsubscribe() を呼んでいた
  // 変更後: messaging.deleteToken() で FCM トークンを無効化する
  //         → GASのSubscribersシートからの削除は doPost action:'unsubscribe' で行う
  // ────────────────────────────────────────────────────────────────
  async function unsubscribeFromPush() {
    try {
      // FCM SDK でトークンを削除（FCMサーバー側でもトークンが無効化される）
      await messaging.deleteToken();
      console.log('[FCM] トークン削除成功');

      // GAS の Subscribers シートからも削除する
      // deleteToken() 後は getToken() を呼び直さないとトークンが取れなくなるため
      // トークン特定ができない。そのため GAS 側では「トークンが存在しない → 自然消滅」で
      // 対応する設計とし、明示的な削除はオプションとして fire-and-forget で送る
      await fetch(CONFIG.GAS_ENDPOINT, {
        method:   'POST',
        redirect: 'follow',
        headers:  { 'Content-Type': 'text/plain' },
        body:     JSON.stringify({ action: 'unsubscribe' }),
      }).catch(e => console.warn('[FCM] GAS解除通知失敗（無視）:', e));

      updatePushUI('default');
      showToast('通知を停止しました');

    } catch (err) {
      console.error('[FCM] 解除エラー:', err);
      showToast('エラーが発生しました');
    }
  }

  // ────────────────────────────────────────────────────────────────
  // スプレッドシートから最新の活動情報を取得して表示
  // ────────────────────────────────────────────────────────────────
  // ────────────────────────────────────────────────────────────────
  // スプレッドシートから最新の活動情報を取得して表示
  // ────────────────────────────────────────────────────────────────
  async function loadActivityInfo() {
    document.getElementById('activityLoading').classList.remove('hidden');
    document.getElementById('activityContent').classList.add('hidden');
    document.getElementById('materialImg').classList.add('hidden');
    document.getElementById('materialLoading').textContent = '読み込み中…';

    try {
      const res = await fetch(
        `${CONFIG.GAS_ENDPOINT}?action=getLatest`,
        { redirect: 'follow' }
      );
      if (!res.ok) throw new Error(`HTTPエラー: ${res.status} ${res.statusText}`);

      const json = await res.json();
      console.log('[App] GASレスポンス:', json);

      if (json.status === 'error') throw new Error(json.message || '不明なエラー');

      if (json.status === 'empty' || !json.data) {
        document.getElementById('activityLoading').textContent = 'まだ活動情報が登録されていません。';
        document.getElementById('materialLoading').textContent = 'まだ活動情報が登録されていません。';
        return;
      }

      // ★★★ ここから下が新しく書き換わった部分 ★★★
      const { date, room, url } = json.data; // imageUrl を url に修正！

      document.getElementById('activityLoading').classList.add('hidden');
      document.getElementById('activityContent').classList.remove('hidden');
      document.getElementById('infoDate').textContent = date || '未設定';
      document.getElementById('infoRoom').textContent = room || '未設定';

      // URLが本当に「http」から始まる本物のリンクかチェック
      const hasValidUrl = url && url.startsWith('http');

      document.getElementById('infoNote').textContent = hasValidUrl ? '資料あり（下記参照）' : '資料なし';

      const imgEl     = document.getElementById('materialImg');
      const loadingEl = document.getElementById('materialLoading');

      if (hasValidUrl) {
        const directUrl   = convertDriveUrl(url);
        imgEl.onload  = () => { loadingEl.classList.add('hidden'); };
        imgEl.onerror = () => {
          loadingEl.textContent = '画像を読み込めませんでした。DriveファイルのURLと共有設定（リンクを知っている全員）を確認してください。';
          imgEl.classList.add('hidden');
        };
        imgEl.src = directUrl;
        imgEl.classList.remove('hidden');
      } else {
        // httpから始まらない文字（GASが送る「準備中…」など）をそのまま画面に出す
        loadingEl.textContent = url || '今週の資料はまだアップロードされていません。';
      }
      // ★★★ ここまで ★★★

    } catch (err) {
      console.error('[App] 活動情報の取得に失敗:', err);
      document.getElementById('activityLoading').textContent = '情報の取得に失敗しました。時間をおいて再度お試しください。';
      document.getElementById('materialLoading').textContent = '';
    }
  }

  // ────────────────────────────────────────────────────────────────
  // メイン初期化
  // ────────────────────────────────────────────────────────────────
  async function init() {
    // 1. Service Worker を登録し、swRegistration に保持する
    swRegistration = await registerServiceWorker();

    // 2. 活動情報を読み込む（通知とは独立して実行）
    loadActivityInfo();

    // 3. Push通知対応チェック（SW失敗 と 通知API非対応 を個別に判定）
    if (!swRegistration) {
      document.getElementById('pushDescription').textContent =
        'Service Workerの登録に失敗しました。ページを再読み込みしてください。';
      updatePushUI('denied');
      return;
    }
    if (!('Notification' in window)) {
      document.getElementById('pushDescription').textContent =
        'このブラウザはプッシュ通知に対応していません。';
      updatePushUI('denied');
      return;
    }

    // 4. 現在の通知許可状態に応じてUIを初期化
    const currentPermission = Notification.permission;
    if (currentPermission === 'granted') {
      // 既にFCMトークンが有効か確認する
      // getToken()はキャッシュを返すため、許可済みなら即座に返る
      try {
        const token = await messaging.getToken({
          vapidKey: CONFIG.VAPID_PUBLIC_KEY,
          serviceWorkerRegistration: swRegistration,
        });
        updatePushUI(token ? 'granted' : 'default');
      } catch {
        updatePushUI('default');
      }
    } else {
      updatePushUI(currentPermission); // 'default' or 'denied'
    }

    // 5. ボタンイベント（SWをパラメータとして渡す必要がなくなった）
    document.getElementById('btnSubscribe').addEventListener('click', subscribeToPush);
    document.getElementById('btnUnsubscribe').addEventListener('click', unsubscribeFromPush);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
